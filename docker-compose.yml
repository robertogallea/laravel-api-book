services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - .:/var/www/html
    environment:
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: eventhub
      DB_USERNAME: eventhub
      DB_PASSWORD: eventhub
    depends_on:
      mysql:
        condition: service_healthy

  mysql:
    image: mysql:8.4
    # Local development only: these credentials are never used in production and must not be
    # reused anywhere real.
    environment:
      MYSQL_DATABASE: eventhub
      MYSQL_USER: eventhub
      MYSQL_PASSWORD: eventhub
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - eventhub-mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "eventhub", "-peventhub"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  eventhub-mysql-data:
